# Reusable PR Gates — single source of truth for the sidehustle fleet's PR pipeline.
# PUBLIC, YAML-only repo: no product code, no secret VALUES (only names; values injected
# by each private caller via `secrets: inherit`). The github context inside a called
# workflow is the CALLER's event, so github.event.pull_request.* and github.repository
# resolve to the caller's PR/repo, and each job's checkout reads the caller repo
# (scripts/classify-tier.sh + .claude/rules/* live there).
#
# COST CONTROLS (v3):
#   - `changes` (dorny/paths-filter) is the first job. Doc-only PRs (**/*.md, specs/**,
#     .claude/rules/**, docs/**, LICENSE) set code=false, which SKIPS the expensive jobs
#     (e2e + all three AI gates + eval). lint/typecheck/unit ALWAYS run as the floor.
#   - Cheap before expensive: e2e and the AI gates only start after lint+typecheck are
#     green (they are in `needs`), so a lint/type error never burns Playwright or LLM cost.
#   - Playwright browsers are cached (~/.cache/ms-playwright, keyed on OS + version).
#   - gates-green treats SKIPPED gate jobs as PASS (alls-green `allowed-skips`), so a
#     doc-only PR — where the gates are skipped — still aggregates green and merges.
#
# GATE 3 (codex-adversarial) is tier-gated: it BLOCKS only on tier-2/3 PRs (tier recomputed
# at runtime from the diff via the caller's scripts/classify-tier.sh, exactly like
# architect-gate); on tier-1 it runs as pure advisory (never fails). Gate 2 (claude-review)
# stays the blocking floor on every code PR regardless of tier.
name: Reusable PR Gates

on:
  workflow_call:
    inputs:
      merge_mode:
        # How the final gates-green job merges a fully-green PR:
        #   auto   — `gh pr merge --auto --squash` (DEFAULT). Queues the merge so it
        #            isn't blocked by the in-progress "Gates Green" required check.
        #            Requires GitHub-flow that supports auto-merge (a paid plan / branch
        #            protection). This is the PUBLIC foundation's behaviour and stays the
        #            default so no existing caller has to change anything.
        #   direct — `gh pr merge --squash` (no --auto). Merges immediately once every
        #            gate is green. Works on a FREE private repo precisely because Free has
        #            no branch protection, so there is no "Gates Green" required-check
        #            self-deadlock and no auto-merge entitlement is needed.
        # The tier-3 schranke is UNAFFECTED by this input: a tier-3 PR without jo-approved
        # is blocked before the merge step regardless of merge_mode.
        description: 'Merge strategy for green PRs: auto (--auto, default) or direct (immediate squash, Free-plan).'
        type: string
        required: false
        default: auto
    secrets:
      DEEPSEEK_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      PUSHOVER_APP_TOKEN:
        required: false
      PUSHOVER_USER_KEY:
        required: false

jobs:
  # ---------------------------------------------------------------------------------------
  # COST GATE — classify the diff as code-touching or doc-only. Doc-only PRs skip every
  # expensive job below (e2e + the three AI gates + eval). Uses the GitHub REST API to list
  # the caller PR's changed files, so it needs no checkout. `predicate-quantifier: every`
  # + dot:true (paths-filter default) means a file counts as `code` only when it matches
  # `**` AND none of the doc-only negations — i.e. code=true iff >=1 non-doc file changed.
  # ---------------------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!specs/**'
              - '!.claude/rules/**'
              - '!docs/**'
              - '!LICENSE'

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  # lint / typecheck / unit ALWAYS run (the cheap floor) — even on doc-only PRs, so a
  # green doc-only PR still has the required jobs concluding `success` and can merge.
  lint:
    name: Lint
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: Unit Tests
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # E2E is expensive (Playwright browser download + real browser run). Skip it on doc-only
  # PRs, and only start it after lint+typecheck are green so a cheap failure short-circuits
  # the browser cost. Browsers are cached on ~/.cache/ms-playwright keyed by OS + version.
  e2e:
    name: E2E Tests
    needs: [workflow-lint, changes, lint, typecheck, unit]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version (for cache key)
        id: pw
        run: |
          # Read the installed Playwright version so the browser cache invalidates on a
          # version bump. Resilient: an unparseable/absent version falls back to a generic
          # bucket rather than failing the job here (pnpm test:e2e is the real e2e gate).
          version="$(pnpm exec playwright --version 2>/dev/null | awk '{print $NF}' || true)"
          echo "version=${version:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
          # Warm from the most recent browser cache when the version probe misses
          # (e.g. resolves to the 'unknown' bucket) instead of re-downloading.
          restore-keys: |
            ${{ runner.os }}-playwright-
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  claude-review:
    name: Claude Review (Gate 2)
    needs: [workflow-lint, changes, lint, typecheck, unit, e2e]
    if: needs.changes.outputs.code == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      # ROLLBACK-PFAD (deaktiviert seit 2026-06-04, Jo's Standing-Order DeepSeek-Default).
      # Falls Rollback auf Anthropic nötig: untere 5 DeepSeek-Zeilen auskommentieren, untere
      # ANTHROPIC_API_KEY-Zeile aktivieren.
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_MODEL: deepseek-v4-flash
      ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
      CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run /review-pr (Gate 2) — stdout to file
        id: claude_review
        run: |
          set +e
          PR=${{ github.event.pull_request.number }}
          claude -p "/review-pr $PR" --model deepseek-v4-flash > /tmp/claude_review.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post Claude Review verdict to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          {
            echo "## Gate 2 — Claude Review"
            echo ""
            echo "Exit code: ${{ steps.claude_review.outputs.exit_code }}"
            echo ""
            echo '<details><summary>Full verdict (stdout)</summary>'
            echo ''
            echo '```'
            cat /tmp/claude_review.txt 2>/dev/null || echo 'No output captured.'
            echo '```'
            echo '</details>'
          } > /tmp/claude_review_comment.md
          gh pr comment "$PR" -F /tmp/claude_review_comment.md || true

      - name: Verify VERDICT format present (Gate 2 format-drift guard)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The /review-pr reviewer posts the canonical VERDICT as a PR
          # comment and emits only a one-line summary to stdout. Accept a
          # VERDICT: line from EITHER surface; fail only if neither has one
          # (true format-drift or the reviewer never posted a verdict).
          PR=${{ github.event.pull_request.number }}
          if grep -qE "^VERDICT:" /tmp/claude_review.txt 2>/dev/null; then
            echo "VERDICT line found in reviewer stdout."
          elif gh pr view "$PR" --repo "${{ github.repository }}" --json comments --jq '.comments[].body' | grep -qE "^VERDICT:"; then
            echo "VERDICT line found in a posted PR comment."
          else
            echo "::error::Gate 2 — no VERDICT: line in reviewer stdout or PR comments. Format-drift. Failing gate."
            exit 1
          fi

      - name: Enforce Gate 2 verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          # Condition 1 (independent): the reviewer CLI must have exited 0.
          if [ "${{ steps.claude_review.outputs.exit_code }}" != "0" ]; then
            echo "::error::Gate 2 FAILED — Claude Review returned non-zero exit."
            exit 1
          fi
          # Condition 2 (independent): the VERDICT *content* must be PASS. The reviewer
          # posts the canonical verdict to a PR comment and/or stdout; read the VERDICT
          # value from stdout first, else from the latest PR comment.
          # `|| true` on each substitution: a no-match sed/grep exits non-zero, which under
          # the default `bash -eo pipefail` would abort the step at the assignment and make
          # the comment fallback UNREACHABLE — false-FAILing a PR whose VERDICT lives only in
          # a PR comment (the documented comment-only path). sed-capture also tolerates a
          # no-space `VERDICT:PASS`.
          verdict="$(sed -nE 's/^VERDICT:[[:space:]]*(PASS|FAIL|PARTIAL).*/\1/p' /tmp/claude_review.txt 2>/dev/null | head -1 || true)"
          if [ -z "$verdict" ]; then
            verdict="$(gh pr view "$PR" --repo "${{ github.repository }}" --json comments --jq '.comments[].body' | sed -nE 's/^VERDICT:[[:space:]]*(PASS|FAIL|PARTIAL).*/\1/p' | tail -1 || true)"
          fi
          if [ "$verdict" = "PASS" ]; then
            echo "Gate 2 PASSED (VERDICT: PASS, exit 0)."
          else
            echo "::error::Gate 2 FAILED — verdict=${verdict:-MISSING} (only VERDICT: PASS passes)."
            exit 1
          fi

  codex-adversarial:
    name: Codex Adversarial Review (Gate 3)
    needs: [workflow-lint, changes, claude-review]
    if: needs.changes.outputs.code == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    # Pure OpenAI stack — no Anthropic/DeepSeek env here. Gate 3's cross-family
    # anchor: Gate 2 reviews on DeepSeek, Gate 3 adversarially re-reviews on OpenAI.
    # BLOCKING only on tier-2/3 (tier recomputed from the diff, like architect-gate);
    # tier-1 = pure advisory. Gate 2 remains the floor on all code PRs.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tier (recomputed from the diff — only tier-2/3 blocks)
        id: tier
        run: |
          # Recompute the tier authoritatively from the diff via the shared classifier in
          # the caller. Labels are mutable, so the gate must not trust them. tier-2/3 =>
          # Gate 3 blocks on a CRITICAL; tier-1 => Gate 3 is advisory only (never fails).
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          files="$(git diff --name-only "$base" "$head")"
          tier="$(printf '%s\n' "$files" | bash scripts/classify-tier.sh)"
          echo "Computed tier: $tier"
          case "$tier" in
            tier-2|tier-3) echo "blocking=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "blocking=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Fetch previous Gate 3 verdict (delta-awareness)
        run: |
          # Pull the most recent marker-tagged Gate-3 verdict so codex can do a DELTA
          # review on a re-run (synchronize) instead of re-litigating the whole diff and
          # surfacing a fresh angle each cycle. Empty files on the first review.
          PR=${{ github.event.pull_request.number }}
          gh pr view "$PR" --repo "${{ github.repository }}" --json comments \
            --jq '([.comments[] | select(.body | contains("<!-- gate3-codex-verdict -->")) | .body] | last) // ""' \
            > prev-verdict.md 2>/dev/null || true
          [ -f prev-verdict.md ] || : > prev-verdict.md
          prev_sha="$(grep -oE 'REVIEWED_SHA: [0-9a-f]{7,40}' prev-verdict.md | tail -1 | awk '{print $2}' || true)"
          # If the recorded SHA is unreachable (author force-pushed/rebased away the old
          # head), blank it so the codex prompt falls back to a full base..HEAD review rather
          # than `git diff <missing-sha> HEAD` (which would yield an empty/garbled increment).
          if [ -n "${prev_sha:-}" ] && ! git cat-file -e "${prev_sha}^{commit}" 2>/dev/null; then
            echo "Recorded REVIEWED_SHA ${prev_sha} is unreachable (force-push/rebase) — full review."
            prev_sha=""
          fi
          printf '%s' "${prev_sha:-}" > prev-sha.txt
          if [ -n "${prev_sha:-}" ]; then
            echo "Previous Gate-3 review found (last reviewed sha=${prev_sha}) — delta mode."
          else
            echo "No usable previous Gate-3 review — full review."
          fi

      - name: Codex adversarial review (headless, openai/codex-action)
        id: codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          # Pinned for predictable cost (input names verified against codex-action action.yml).
          # The codex-specialised line tops out at gpt-5.3-codex (latest; gpt-5.5/5.4 are the
          # GENERAL models, there is no gpt-5.5-codex — confirmed model_not_found). 5.3-codex
          # is the smartest codex model; NOT a -mini (too weak for the safety gate).
          # effort=medium is the main cost lever.
          model: gpt-5.3-codex
          effort: medium
          sandbox: read-only
          output-file: codex-output.md
          prompt: |
            You are the Gate 3 adversarial reviewer for this pull request. Do NOT modify
            any files — this is a read-only review.

            DELTA-AWARENESS (read this FIRST):
            - Your previous Gate-3 verdict for this PR, if any, is in ./prev-verdict.md
              (empty on the first review). The git SHA you last reviewed is in
              ./prev-sha.txt (empty on the first review).
            - FIRST REVIEW (prev-sha.txt empty): review the full diff between the PR base
              ${{ github.event.pull_request.base.sha }} and HEAD —
              run `git diff ${{ github.event.pull_request.base.sha }} HEAD`.
            - RE-REVIEW (prev-sha.txt non-empty): the author pushed a fix. Do EXACTLY two
              things: (1) re-check EACH prior finding in ./prev-verdict.md against the CURRENT
              HEAD and record it in the `PRIOR FINDINGS:` block (see output format) as
              `[RESOLVED]` if it is fixed (BEHOBEN — cite the fix) or `[STILL-OPEN]` if not; a
              still-open prior finding ALSO appears once in `FINDINGS:` with its
              `[CRITICAL]`/`[ADVISORY]` tag. (2) look for NEW issues ONLY in the increment
              since your last review — run `git diff "$(cat ./prev-sha.txt)" HEAD`. Do NOT
              re-raise a finding the current diff already resolves (list it ONLY as
              `[RESOLVED]`, never as `[CRITICAL]`/`[ADVISORY]`), and do NOT invent new ADVISORY
              side-quests to justify a FAIL. If every prior CRITICAL is resolved and the
              increment adds no new CRITICAL, the verdict is PASS.

            Apply the rubric in ./.claude/rules/review.md — all six criteria (Issue Match,
            Architecture, Test Sufficiency, Code Health, Boy Scout, Safety). Be adversarial,
            but apply the SEVERITY GATE in ./.claude/rules/review.md. Classify every finding
            as exactly one severity:
              - CRITICAL: a security vulnerability, a correctness/logic bug, or a violation
                of an architecture invariant in ./.claude/rules/architecture.md (a forbidden
                pattern, a layer/dependency-direction break, a missing module index.ts, raw
                SQL outside migrations, a committed secret, or a risk-path change missing its
                required label).
              - ADVISORY: everything else — style, naming, magic numbers, documentation
                drift, test rigor/coverage suggestions, robustness/edge-case hardening,
                performance, "nice to have". ADVISORY findings NEVER cause FAIL.

            KNOWN NON-ISSUES — never classify these as CRITICAL (deliberate or N/A):
            - Typed-query / generated-types regeneration: the architecture.md "regenerate
              typed queries after a schema change" Change-Safety clause applies ONLY if this
              repo actually ships a GENERATED Database type (e.g. a committed generated types
              artifact such as database.types.ts, or generated Drizzle/Supabase schema
              types). MANY repos use UNTYPED Supabase/DB clients — there this clause is N/A.
              Do NOT demand typed-query regeneration, or FAIL for "missing regenerated
              types", unless you can point to an actual generated type artifact in THIS repo
              that the change invalidates. Absent that artifact, it is NOT a finding.
            - Deliberate fleet-canonical decisions — do NOT re-litigate these as findings:
              the canonical commit author identity (Jobi0202 <tomorrow.tech.lab@gmail.com>);
              the Free-plan setup (no branch protection — "merge only when green" is enforced
              by the workflow job-graph, not by GitHub required checks); and the merge_mode
              input (auto vs direct) and @main/tag pinning of the shared reusable workflow.
              These are intentional, owner-approved conventions, not defects.
            - Your OWN sandbox limits are NOT repo defects: if you cannot fetch PR metadata,
              reach the network, run gh, or run pnpm/tests in this read-only sandbox, do NOT
              report that as a finding — it is an environment constraint, not a code problem.

            Decide the verdict by this rule ONLY:
              VERDICT: FAIL  iff there is at least one CRITICAL finding;
              VERDICT: PASS  iff there are zero CRITICAL findings (ADVISORY findings are OK).

            Output format (output ONLY this, nothing else):
            - FIRST line, exactly: `VERDICT: PASS` or `VERDICT: FAIL`.
            - Then the six CRITERIA lines (`- <Criterion>: PASS|FAIL — <evidence>`).
            - On a RE-REVIEW only, a `PRIOR FINDINGS:` block — one line per prior finding you
              audited, each starting with `[RESOLVED]` (BEHOBEN) or `[STILL-OPEN]`, then
              `<path:line> — <evidence>`. This block is an audit trail and is NOT counted.
            - Then `FINDINGS:` and one line per CURRENTLY-OPEN finding, each starting with
              `[CRITICAL]` or `[ADVISORY]` followed by `<path:line> — <required fix>`. Write
              `[none]` if there are no open findings. NEVER tag a resolved/BEHOBEN finding
              `[CRITICAL]` or `[ADVISORY]` — a resolved finding belongs ONLY in PRIOR FINDINGS
              as `[RESOLVED]`.
            - LAST line, exactly: `SEVERITY_SUMMARY: CRITICAL=<n> ADVISORY=<m>` where <n> is
              the number of currently-open [CRITICAL] lines and <m> the open [ADVISORY] lines.

      - name: Post Codex verdict to PR (CRITICAL prominent, ADVISORY collapsed)
        if: always()
        run: |
          # set +e: this step is a pure formatter/poster. On a tier-1 PR the job RAN (so
          # alls-green does not forgive it via allowed-skips) — a formatter crash under the
          # default errexit would taint gates-green even though Gate 3 is advisory here.
          set +e
          PR=${{ github.event.pull_request.number }}
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          BLOCKING='${{ steps.tier.outputs.blocking }}'
          out=codex-output.md
          {
            # Hidden marker so the next run's delta-fetch can find THIS verdict.
            echo "<!-- gate3-codex-verdict -->"
            echo "## Gate 3 — Codex Adversarial Review (openai/codex-action)"
            echo ""
            if [ "$BLOCKING" = "true" ]; then
              echo "_Tier-2/3 PR — Gate 3 is BLOCKING (a CRITICAL finding fails the gate)._"
            else
              echo "_Tier-1 PR — Gate 3 is ADVISORY only (does not block merge; Gate 2 is the floor)._"
            fi
            echo ""
            if [ -s "$out" ]; then
              # Headline verdict, rendered bold so the line does NOT begin with `VERDICT:`
              # (other gates grep PR comments for ^VERDICT:; keep this from colliding).
              head -n1 "$out" | sed 's/^VERDICT:/**VERDICT:**/'
              echo ""
              # Six criteria lines.
              grep -E '^- (Issue Match|Architecture|Test Sufficiency|Code Health|Boy Scout|Safety):' "$out" || true
              echo ""
              crit_lines="$(grep -E '^[[:space:]]*(- )?\[CRITICAL\]' "$out" 2>/dev/null | grep -viE 'BEHOBEN|RESOLVED' || true)"
              if [ -n "$crit_lines" ]; then
                echo "### ⛔ CRITICAL findings"
                echo ""
                printf '%s\n' "$crit_lines"
              else
                echo "### ✅ No CRITICAL findings"
              fi
              echo ""
              adv_lines="$(grep -E '^[[:space:]]*(- )?\[ADVISORY\]' "$out" || true)"
              if [ -n "$adv_lines" ]; then
                adv_count="$(printf '%s\n' "$adv_lines" | grep -c . || true)"
                echo "<details><summary>Advisory findings (${adv_count}) — non-blocking</summary>"
                echo ""
                printf '%s\n' "$adv_lines"
                echo ""
                echo "</details>"
                echo ""
              fi
              resolved_lines="$(grep -E '^[[:space:]]*(- )?\[RESOLVED\]' "$out" 2>/dev/null || true)"
              if [ -n "$resolved_lines" ]; then
                res_count="$(printf '%s\n' "$resolved_lines" | grep -c . || true)"
                echo "<details><summary>✅ Resolved since last review (${res_count})</summary>"
                echo ""
                printf '%s\n' "$resolved_lines"
                echo ""
                echo "</details>"
                echo ""
              fi
              echo "<details><summary>Full codex output</summary>"
              echo ""
              echo '```'
              # Neutralize a leading VERDICT:/SEVERITY line inside the fenced raw block so it
              # can't be mistaken for another gate's ^VERDICT: comment-grep (fences do not
              # shield lines from grep).
              sed -E 's/^VERDICT:/VERDICT (codex-output):/' "$out"
              echo '```'
              echo "</details>"
            else
              echo "**VERDICT:** (none) — codex-action emitted no output."
              if [ "$BLOCKING" = "true" ]; then
                echo ""
                echo "_Treated as FAIL on this tier-2/3 PR._"
              fi
            fi
            echo ""
            # Machine-readable footer the next run reads to scope its delta review.
            echo "REVIEWED_SHA: ${HEAD_SHA}"
          } > /tmp/codex_verdict.md
          gh pr comment "$PR" -F /tmp/codex_verdict.md || true

      - name: Verify VERDICT format present (Gate 3 format-drift guard — tier-2/3 only)
        if: steps.tier.outputs.blocking == 'true'
        run: |
          # Fail-safe on a BLOCKING PR: any format drift => FAIL, so a malformed review can
          # never become a silent PASS. Requires (a) a canonical first-line VERDICT and (b)
          # the machine-readable SEVERITY_SUMMARY line the enforce step parses.
          first_line="$(head -n1 codex-output.md 2>/dev/null || true)"
          if ! printf '%s\n' "$first_line" | grep -qE '^VERDICT:[[:space:]]*(PASS|FAIL)[[:space:]]*$'; then
            echo "::error::Gate 3 — first line of codex-output.md is not 'VERDICT: PASS|FAIL'. Got: ${first_line:-<empty>}. Failing gate."
            exit 1
          fi
          if ! grep -qE '^SEVERITY_SUMMARY: CRITICAL=[0-9]+ ADVISORY=[0-9]+$' codex-output.md; then
            echo "::error::Gate 3 — missing 'SEVERITY_SUMMARY: CRITICAL=<n> ADVISORY=<m>' line (format drift). Failing gate."
            exit 1
          fi
          echo "Format OK: $first_line"

      - name: Enforce gate verdict (severity gate — tier-2/3, only CRITICAL blocks)
        if: steps.tier.outputs.blocking == 'true'
        run: |
          # (1) The codex-action step itself must have succeeded (guards continue-on-error
          #     so an action failure can never be masked by a stale output file).
          if [ "${{ steps.codex.outcome }}" != "success" ]; then
            echo "::error::Gate 3 FAILED — codex-action step outcome=${{ steps.codex.outcome }} (not success)."
            exit 1
          fi
          # (2) Authoritative severity gate, computed by the workflow (not codex's self-
          #     verdict): block iff there is >= 1 CRITICAL finding, by the MAX of two
          #     independent measures — the SEVERITY_SUMMARY count and the number of
          #     [CRITICAL]-tagged finding lines. ADVISORY findings never block.
          summary="$(grep -E '^SEVERITY_SUMMARY: CRITICAL=[0-9]+ ADVISORY=[0-9]+$' codex-output.md | tail -1 || true)"
          sum_crit="$(printf '%s' "$summary" | sed -nE 's/^SEVERITY_SUMMARY: CRITICAL=([0-9]+).*/\1/p')"
          sum_crit="${sum_crit:-0}"
          # Count ONLY currently-open criticals: a delta re-review records resolved findings
          # as [RESOLVED] (not [CRITICAL]); the extra BEHOBEN/RESOLVED exclusion is a guard in
          # case the model still appends a resolution note to a [CRITICAL] line.
          tag_crit="$(grep -E '^[[:space:]]*(- )?\[CRITICAL\]' codex-output.md 2>/dev/null | grep -vciE 'BEHOBEN|RESOLVED' || true)"
          tag_crit="${tag_crit:-0}"
          crit=$(( sum_crit > tag_crit ? sum_crit : tag_crit ))
          if [ "$crit" -gt 0 ]; then
            echo "::error::Gate 3 FAILED — ${crit} CRITICAL finding(s) on a tier-2/3 PR. (ADVISORY findings are non-blocking.)"
            exit 1
          fi
          echo "Gate 3 PASSED — 0 CRITICAL findings; advisories (if any) are non-blocking."

      - name: Tier-1 — Gate 3 advisory only (never blocks)
        if: steps.tier.outputs.blocking != 'true'
        run: |
          # tier-1 PR: Gate 3 is advisory. The verdict comment is already posted above; we
          # only log the outcome and always exit 0. Gate 2 (claude-review) remains the floor.
          if [ -s codex-output.md ]; then
            crit="$(grep -E '^[[:space:]]*(- )?\[CRITICAL\]' codex-output.md 2>/dev/null | grep -vciE 'BEHOBEN|RESOLVED' || true)"
            echo "Gate 3 (advisory, tier-1): codex ran (step outcome=${{ steps.codex.outcome }}), ${crit:-0} open CRITICAL finding(s) reported — NOT blocking on tier-1."
          else
            echo "Gate 3 (advisory, tier-1): no codex output (step outcome=${{ steps.codex.outcome }}) — NOT blocking on tier-1."
          fi

  architect-gate:
    name: Architect Gate (tier-2/3)
    needs: [workflow-lint, changes, claude-review]
    if: needs.changes.outputs.code == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    # Third model family (Gate 2 DeepSeek, Gate 3 OpenAI, architect Anthropic-Opus).
    # Always runs and resolves the tier at RUNTIME (no job-level `if` on event-payload
    # labels — that races auto-label-risk). For tier-1 it is a no-op PASS, so it can sit
    # in gates-green needs without alls-green skip handling.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine tier (recomputed from the diff — never the mutable label)
        id: tier
        run: |
          # Compute the tier authoritatively from the diff via the shared classifier.
          # Labels are mutable (anyone with write access could relabel a tier-3 PR), so
          # the gate must not trust them — it recomputes.
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          files="$(git diff --name-only "$base" "$head")"
          tier="$(printf '%s\n' "$files" | bash scripts/classify-tier.sh)"
          echo "Computed tier: $tier"
          case "$tier" in
            tier-2|tier-3) echo "run=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "run=false" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Install Claude Code CLI
        if: steps.tier.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code@latest
      - name: Architect review (Anthropic Opus — irreversibility + schema-safety)
        if: steps.tier.outputs.run == 'true'
        id: arch
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set +e
          BASE='${{ github.event.pull_request.base.sha }}'
          claude -p "You are the ARCHITECT GATE for a tier-2/tier-3 risk PR. Review the diff: run \`git diff $BASE HEAD\`. Judge EXCLUSIVELY two things: (1) IRREVERSIBILITY — destructive or breaking DDL / data loss that cannot be cleanly rolled back; (2) SCHEMA-SAFETY against existing rows — e.g. ADD COLUMN NOT NULL without DEFAULT on a populated table, type narrowing, a UNIQUE constraint on possibly-duplicate data, or a long-locking migration. Your FIRST line must be exactly 'VERDICT: PASS' or 'VERDICT: FAIL', then 2-6 lines of evidence. PASS only if the change is reversible AND safe against existing rows; otherwise FAIL." --model opus > /tmp/arch.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          echo "--- architect output ---"; cat /tmp/arch.txt
          exit 0
      - name: Post architect verdict to PR
        if: steps.tier.outputs.run == 'true'
        run: |
          PR=${{ github.event.pull_request.number }}
          {
            echo "## Architect Gate (tier-2/3) — Anthropic Opus"
            echo ""
            if [ -s /tmp/arch.txt ]; then cat /tmp/arch.txt; else echo "_No architect output (treated as FAIL)._"; fi
          } > /tmp/arch_comment.md
          gh pr comment "$PR" -F /tmp/arch_comment.md || true
      - name: Enforce architect verdict
        if: steps.tier.outputs.run == 'true'
        run: |
          if [ "${{ steps.arch.outputs.exit_code }}" != "0" ]; then
            echo "::error::Architect gate — claude CLI exited non-zero."
            exit 1
          fi
          first_line="$(head -n1 /tmp/arch.txt 2>/dev/null || true)"
          verdict="$(printf '%s' "$first_line" | sed -nE 's/^VERDICT:[[:space:]]*(PASS|FAIL)[[:space:]]*$/\1/p')"
          if [ "$verdict" = "PASS" ]; then
            echo "Architect gate PASSED (VERDICT: PASS)."
          else
            echo "::error::Architect gate FAILED — first-line verdict=${verdict:-MALFORMED} (needs-rework)."
            exit 1
          fi
      - name: Tier-1 — architect gate not required
        if: steps.tier.outputs.run != 'true'
        run: echo "PR is tier-1 — architect gate not required. PASS."

  # ADVISORY eval gate (promptfoo). Intentionally NOT in gates-green's `needs` and NOT a
  # required check, so it can NEVER block auto-merge. Subtle but critical: a caller re-exports
  # the WHOLE reusable run's result as its required "Gates Green" check, so ANY job here that
  # concludes non-success (failure OR cancelled) would taint that result and block the merge —
  # defeating "advisory". This job is therefore engineered, WHEN IT RUNS, to ALWAYS conclude
  # `success`: EVERY step carries `continue-on-error: true`, and there is deliberately NO
  # job-level `timeout-minutes` (a job timeout concludes `cancelled`, which a step's
  # continue-on-error cannot absorb). The only long operations carry their own step timeouts.
  # It only reports. Skipped on doc-only/draft PRs (changes.code == false / draft) like the
  # other expensive jobs; a `skipped` job — like a `success` one — does not taint the caller's
  # re-exported run result, so the never-block guarantee holds whether it runs or is skipped.
  eval-gate:
    name: Eval Gate (advisory)
    needs: [workflow-lint, changes, lint, typecheck]
    if: needs.changes.outputs.code == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true
      - name: Detect promptfoo config (root or promptfoo/)
        id: detect
        continue-on-error: true
        run: |
          # No-op safety: a caller WITHOUT a promptfoo config gets a green no-op, never a
          # failure. Look for the config in the repo root and in promptfoo/ (.yaml or .yml).
          config=""
          for f in promptfooconfig.yaml promptfooconfig.yml promptfoo/promptfooconfig.yaml promptfoo/promptfooconfig.yml; do
            if [ -f "$f" ]; then config="$f"; break; fi
          done
          if [ -z "$config" ]; then
            echo "kein Eval-Config, skip — no promptfooconfig.yaml in root or promptfoo/. Advisory eval-gate is a no-op PASS."
            echo "has_config=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found promptfoo config: $config"
            echo "has_config=true" >> "$GITHUB_OUTPUT"
            echo "config_path=$config" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Node (promptfoo runs via npx — no pnpm install / lockfile cache needed)
        if: steps.detect.outputs.has_config == 'true'
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          # promptfoo@latest requires Node ^20.20.0 || >=22.22.0, so the fleet's bare `20`
          # (which can resolve to a 20.x < 20.20.0) would make promptfoo refuse to run. Use the
          # newest LTS to stay safely above the floor; this job only runs npx promptfoo, so the
          # Node version is decoupled from the app's build/test Node.
          node-version: lts/*
      - name: Run promptfoo eval (advisory; DeepSeek judge supplied by the caller's config)
        id: eval
        if: steps.detect.outputs.has_config == 'true'
        continue-on-error: true
        timeout-minutes: 15
        env:
          CONFIG_PATH: ${{ steps.detect.outputs.config_path }}
          # The caller's promptfooconfig.yaml selects a cheap DeepSeek provider as the LLM
          # judge; promptfoo's `deepseek:` provider reads DEEPSEEK_API_KEY. No Anthropic
          # default judge is configured here.
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PROMPTFOO_DISABLE_TELEMETRY: '1'
          # Keep the captured stdout plain so the embedded <details> block has no ANSI escapes.
          NO_COLOR: '1'
          FORCE_COLOR: '0'
        run: |
          set +e
          npx --yes promptfoo@latest eval -c "$CONFIG_PATH" -o /tmp/promptfoo-result.json > /tmp/promptfoo-eval.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Advisory: a non-zero promptfoo exit (e.g. 100 = some cases failed) must NOT fail the
          # job. The verdict is computed and posted as a comment instead.
          exit 0
      - name: Build Eval Gate comment (score + per-case + advisory verdict)
        id: report
        if: steps.detect.outputs.has_config == 'true'
        continue-on-error: true
        env:
          EVAL_EXIT: ${{ steps.eval.outputs.exit_code }}
        run: |
          # `set +e`: Actions runs `run:` with `bash -eo pipefail` by DEFAULT. Without this, a
          # failing `jq` substitution on truncated/invalid promptfoo JSON (timeout-kill, crash,
          # or judge-quota mid-write — all real fleet events) would abort the step and make the
          # job conclude `failure`, which the caller's re-exported "Gates Green" check turns into
          # a blocked merge. This report is best-effort and must ALWAYS finish writing the
          # comment file and exit 0 so the job stays green and the PR still gets feedback.
          set +e
          result_json=/tmp/promptfoo-result.json
          successes=0
          failures=0
          if [ -s "$result_json" ]; then
            successes="$(jq -r '(.results.stats.successes // .stats.successes // 0)' "$result_json" 2>/dev/null)"
            failures="$(jq -r '(.results.stats.failures // .stats.failures // 0)' "$result_json" 2>/dev/null)"
          fi
          case "$successes" in ''|*[!0-9]*) successes=0 ;; esac
          case "$failures" in ''|*[!0-9]*) failures=0 ;; esac
          total=$((successes + failures))
          # Advisory verdict: PASS iff promptfoo exited 0 AND no failing cases.
          if [ "${EVAL_EXIT:-1}" = "0" ] && [ "$failures" -eq 0 ]; then
            verdict="PASS"
          else
            verdict="FAIL"
          fi
          rate="n/a"
          if [ "$total" -gt 0 ]; then
            rate="$(awk -v s="$successes" -v t="$total" 'BEGIN { printf "%.0f%%", (s / t) * 100 }')"
          fi
          cases="$(jq -r '
            ((.results.results?) // (.results?) // [])
            | map({ ok: (.success // false), score: (.score // 0),
                    name: (.testCase.description? // .description? // .prompt.label? // "case") })
            | .[]
            | "| \(if .ok then "✅" else "❌" end) | \(.score) | \((.name | tostring) | gsub("[|\r\n]"; " ")) |"
          ' "$result_json" 2>/dev/null || true)"
          {
            echo "## Eval Gate"
            echo ""
            # Deliberately "VERDICT (advisory):", NOT "VERDICT:" — the other gates grep PR
            # comments for a line matching ^VERDICT: (e.g. claude-review's enforce fallback reads
            # the LATEST such comment). A distinct prefix keeps this advisory verdict from being
            # mistaken for a Gate-2/3 verdict.
            echo "VERDICT (advisory): $verdict — does not block merge."
            echo ""
            if [ "$total" -gt 0 ]; then
              echo "**Score:** ${successes}/${total} cases passed (${rate})."
            else
              echo "**Score:** no case stats parsed (promptfoo exit ${EVAL_EXIT:-unknown}). See output below."
            fi
            echo ""
            if [ -n "$cases" ]; then
              echo "| Result | Score | Case |"
              echo "| --- | --- | --- |"
              printf '%s\n' "$cases"
              echo ""
            elif [ "$total" -gt 0 ]; then
              echo "_Per-case breakdown unavailable (promptfoo JSON schema drift); see raw output below._"
              echo ""
            fi
            echo "<details><summary>promptfoo output</summary>"
            echo ""
            echo '```'
            # Sanitize embedded tool output: strip any ANSI escapes and neutralize a leading
            # "VERDICT:" so a line in promptfoo/judge output can never match another gate's
            # ^VERDICT: comment-grep (markdown code fences do NOT shield lines from grep).
            tail -c 50000 /tmp/promptfoo-eval.txt 2>/dev/null \
              | sed -E 's/\x1b\[[0-9;]*m//g; s/^VERDICT:/VERDICT (eval-output):/' \
              || echo "No promptfoo output captured."
            echo '```'
            echo ""
            echo "</details>"
          } > /tmp/eval_comment.md
          exit 0
      - name: Post Eval Gate comment to PR
        if: steps.detect.outputs.has_config == 'true'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          PR=${{ github.event.pull_request.number }}
          gh pr comment "$PR" -F /tmp/eval_comment.md || true
      - name: Eval Gate format-drift guard (advisory — warns, never fails)
        if: steps.detect.outputs.has_config == 'true'
        continue-on-error: true
        run: |
          # Parity with the other gates' drift guards, but advisory: on drift we emit a warning
          # and still exit 0. A non-zero exit would taint the reusable run and block merge,
          # which an advisory gate must never do.
          if grep -qE '^## Eval Gate$' /tmp/eval_comment.md && grep -qE '^VERDICT \(advisory\): (PASS|FAIL)' /tmp/eval_comment.md; then
            echo "Eval Gate comment format OK (heading + advisory verdict present)."
          else
            echo "::warning::Eval Gate — built comment missing '## Eval Gate' heading or advisory VERDICT line (format drift). Advisory only; merge unaffected."
          fi
      - name: No promptfoo config — advisory no-op PASS
        if: steps.detect.outputs.has_config != 'true'
        continue-on-error: true
        run: echo "No promptfooconfig.yaml in caller (root or promptfoo/). Eval Gate is a no-op PASS — nothing to evaluate; merge unaffected."

  gates-green:
    name: Gates Green
    if: always() && github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main'
    needs: [workflow-lint, changes, lint, typecheck, unit, e2e, claude-review, codex-adversarial, architect-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Aggregate result (alls-green)
        id: alls
        uses: re-actors/alls-green@release/v1
        with:
          # Doc-only PRs SKIP these jobs (changes.code == false). alls-green forgives a
          # skipped job listed here (treats it as PASS), but if one actually RUNS and FAILS
          # it still votes FAIL — so a code PR's gate failure still blocks the merge.
          # workflow-lint / changes / lint / typecheck / unit always run and always vote.
          allowed-skips: e2e, claude-review, codex-adversarial, architect-gate
          jobs: ${{ toJSON(needs) }}

      - name: Checkout (to recompute the tier from the diff)
        if: success()
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tier-3 gate (recomputed from the diff — never the mutable label)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        run: |
          PR=${{ github.event.pull_request.number }}
          # Recompute the tier from the diff with the shared classifier — tier-* labels are
          # mutable, so relabelling a tier-3 PR as tier-1 must NOT bypass jo-approved. Only
          # `jo-approved` (a deliberate Jo action; the labeled trigger re-runs this gate) is
          # read, and only when the COMPUTED tier is tier-3.
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          files="$(git diff --name-only "$base" "$head")"
          tier="$(printf '%s\n' "$files" | bash scripts/classify-tier.sh)"
          echo "Recomputed tier: $tier"
          if [ "$tier" = "tier-2" ]; then
            # A file can be doc-classified by the `changes` job (so architect-gate was SKIPPED)
            # yet be tier-2 by content/path — e.g. an unsafe migration .sql under docs/, or an
            # auth/ file. Do NOT assume architect-gate "carried" it: assert it actually
            # ran-and-passed (a skipped or failed job reports result != 'success').
            arch_result='${{ needs.architect-gate.result }}'
            if [ "$arch_result" != "success" ]; then
              echo "::error::Recomputed tier-2 but architect-gate did not run-and-pass (result=${arch_result}). A doc-classified file (under docs/, specs/, *.md, ...) can still be tier-2 by content/path and would skip architect-gate. Blocking merge."
              exit 1
            fi
            echo "Recomputed tier-2 and architect-gate concluded success — merge allowed."
            exit 0
          fi
          if [ "$tier" != "tier-3" ]; then
            echo "Recomputed $tier (tier-1) — merge allowed."
            exit 0
          fi
          labels=$(gh pr view "$PR" --repo "${{ github.repository }}" --json labels --jq '[.labels[].name] | join(",")')
          case ",$labels," in
            *,jo-approved,*) echo "tier-3 + jo-approved — merge allowed." ;;
            *)
              echo "::error::tier-3 (recomputed from the diff) without jo-approved — auto-merge blocked until Jo approves."
              if [ -n "${PUSHOVER_APP_TOKEN:-}" ] && [ -n "${PUSHOVER_USER_KEY:-}" ]; then
                curl -sS https://api.pushover.net/1/messages.json \
                  --form-string "token=${PUSHOVER_APP_TOKEN}" \
                  --form-string "user=${PUSHOVER_USER_KEY}" \
                  --form-string "title=tier-3 PR needs your approval: #${PR}" \
                  --form-string "message=PR #${PR} is tier-3 (business/legal risk: money movement, data loss, or consent/GDPR) and is blocked until you add the jo-approved label. Read the Architect Gate verdict on the PR for what/why-risky/recommendation." \
                  --form-string "url=${{ github.server_url }}/${{ github.repository }}/pull/${PR}" \
                  --form-string "url_title=Open PR" \
                  --form-string "priority=1" || true
              fi
              exit 1 ;;
          esac

      - name: Merge green PR (mode-dependent — auto vs direct)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_MODE: ${{ inputs.merge_mode }}
        run: |
          PR=${{ github.event.pull_request.number }}
          case "${MERGE_MODE:-auto}" in
            direct)
              # FREE-PLAN path. No branch protection => no "Gates Green" required-check
              # self-deadlock and no auto-merge entitlement, so an immediate squash is
              # both allowed and the only thing that works. This job runs last (needs all
              # gates), so every gate is already green when we reach here.
              echo "merge_mode=direct — squash-merging green PR #$PR immediately (Free-plan)..."
              gh pr merge "$PR" --repo ${{ github.repository }} --squash --delete-branch
              ;;
            *)
              # DEFAULT (auto). Use --auto, NOT an immediate merge. `Gates Green` is itself a
              # required status check on main, so an immediate `gh pr merge` is rejected with
              # "base branch policy prohibits the merge" — at that instant this very job's
              # check is still in-progress. --auto instead QUEUES the squash-merge; GitHub
              # fires it the moment all required checks (incl. this job, once it finishes
              # green) are satisfied. No --admin, required checks respected.
              echo "merge_mode=auto — enabling auto-merge (squash) for PR #$PR..."
              gh pr merge "$PR" --repo ${{ github.repository }} --auto --squash --delete-branch
              ;;
          esac
